<!DOCTYPE html>
<html lang="ja">
  <head>
    <meta charset="UTF-8" />
    <title>Key Counter</title>
    <link rel="stylesheet" href="popup.css" />
  </head>
  <body>
    <header>
      <h1>キー頻度</h1>
      <nav class="tabs">
        <button data-range="day" class="active">今日</button>
        <button data-range="week">7日</button>
        <button data-range="month">30日</button>
        <button data-range="all">全期間</button>
      </nav>
    </header>

    <section class="stats">
      <div>総キー: <span id="total">0</span></div>
      <div>種類: <span id="unique">0</span></div>
      <div>修正率: <span id="correction">0.00%</span></div>
    </section>

    <div class="sort-row">
      <label>並び替え:</label>
      <select id="sort">
        <option value="count">回数順</option>
        <option value="mistakeRate">ミス率順</option>
        <option value="deleted">削除数順</option>
      </select>
    </div>

    <div class="table-wrap">
      <table>
        <thead>
          <tr>
            <th class="num">#</th>
            <th>キー</th>
            <th class="num">回数</th>
            <th class="num">%</th>
            <th class="num">削除</th>
            <th class="num">ミス率</th>
          </tr>
        </thead>
        <tbody id="tbody"></tbody>
      </table>
      <p id="empty" class="empty" hidden>データがありません。ブラウザで少しタイピングしてから開き直してください。</p>
    </div>

    <footer>
      <button id="export">CSV</button>
      <button id="reset" class="danger">リセット</button>
    </footer>

    <script src="popup.js"></script>
  </body>
</html>
